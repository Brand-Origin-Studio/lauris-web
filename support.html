<!DOCTYPE html> 
<html lang="it"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"> 
    <title>Centro di Supporto - Lauris</title> 
    <link rel="stylesheet" href="assets/css/style.css">
</head> 
<body> 

    <div id="nav-placeholder"></div>

    <main class="support-page">
        
        <header class="support-hero text-center">
            <div class="container">
                <h1 class="hero-title reveal delay-1" style="font-size: clamp(3rem, 6vw, 4.5rem);">Come possiamo aiutarti?</h1>
                
                <div class="search-bar-wrapper reveal delay-2">
                    <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="support-search-input" placeholder="Cerca appunti, media, focus mode..." class="support-search">
                </div>
            </div>
        </header>

        <section class="support-dynamic-area">
            <div class="container" style="max-width: 900px; padding: 40px 20px 80px;">
                
                <div id="view-categories" class="support-view active">
                    <div id="categories-grid" class="category-grid reveal delay-3">
                        </div>
                </div>

                <div id="view-category-articles" class="support-view" style="display: none;">
                    <button id="btn-back-categories" class="btn-back">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        Tutte le Categorie
                    </button>
                    <h2 id="category-title" class="section-title" style="margin-top: 24px; font-size: 2.5rem;">Nome Categoria</h2>
                    <div id="category-articles-list" class="article-list">
                        </div>
                </div>

                <div id="view-search-results" class="support-view" style="display: none;">
                    <h2 id="search-title" class="section-title" style="font-size: 2.5rem;">Risultati ricerca</h2>
                    <div id="search-articles-list" class="article-list">
                        </div>
                    <div id="no-results-message" style="display: none; text-align: center; padding: 60px 0;">
                        <span style="font-size: 48px; display: block; margin-bottom: 16px;">🤔</span>
                        <h3 style="color: var(--color-text);">Nessun risultato trovato.</h3>
                        <p style="color: var(--color-text-secondary);">Prova a cercare con termini diversi.</p>
                    </div>
                </div>

            </div>
        </section>

        <!--
        <section class="support-contact text-center reveal">
            <div class="container">
                <h2 style="font-size: 2.5rem; margin-bottom: 16px;">Non trovi la risposta?</h2>
                <p style="font-size: 1.2rem; color: var(--color-text-secondary); margin-bottom: 32px;">Il nostro team di supporto è a tua disposizione per risolvere qualsiasi problema tecnico.</p>
                <a href="mailto:support@lauris.app" class="btn-primary" style="padding: 16px 40px;">Contatta il Team</a>
            </div>
        </section>
-->
    </main>

    <div id="footer-placeholder"></div>

    <div id="dynamic-modal" class="modal-overlay" aria-modal="true" role="dialog" aria-hidden="true">
        <div class="modal-header"> 
            <button id="btn-reader-mode" class="btn-reader" aria-label="Attiva modalità lettura" title="Modalità Lettura">
                <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
            </button>
            <span id="modal-compact-title" class="modal-compact-title"></span>
            <button id="modal-close-btn" class="btn-close" aria-label="Chiudi">&times;</button> 
        </div> 
        <div class="modal-content"> 
            <h2 id="modal-title">Caricamento...</h2> 
            <p id="modal-desc" class="modal-desc"></p> 
            <div id="modal-body" class="dynamic-body"></div>
        </div>
    </div>

    <script src="assets/js/components.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/support.js"></script>

</body> 
</html>
